spring.application.name=Mediscan
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update


ocr.api.key=${OCR_SPACE_API_KEY}
ocr.api.url=${OCR_SPACE_URL}

gemini.api.key=${GEMINI_API_KEY}
gemini.api.url=${GEMINI_API_URL}



# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB


# Redis Configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=5000

# Rate Limiting Configuration

rate.limit.prices.requests-per-minute=10
rate.limit.identify.requests-per-minute=5
rate.limit.generics.requests-per-minute=15